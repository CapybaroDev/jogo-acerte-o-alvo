<!DOCTYPE html>
<html lang="PT-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acerta o alvo</title>
    <style>
        * {
            margin: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        h1 {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
        }

        button.errou {
            background-color: black;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
        }

        button.acertou {
            background-color: red;
            width: 50px;
            height: 50px;
            border-radius: 50px;
            position: absolute;
            top: 50vh;
            left: 50vw;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        div.branca {
            background-color: white;
            width: 30px;
            height: 30px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        div.vermeilha {
            background-color: red;
            width: 10px;
            height: 10px;
            border-radius: 10px;
        }

        button {
            border: none;
        }

        div.distrator {
            background-color: red;
            width: 50px;
            height: 50px;
            border-radius: 50px;
            cursor: pointer;
            position: absolute;
        }
    </style>
</head>

<body>
    <h1>pontuação: <strong id="pts">0</strong></h1>
    <button class="errou" onclick="errou()" id="errou">
        <h2 style="margin-top: 30vh; color: gray; ">Regras: clique no alvo e marque pontos <br>A cada 200 pontos
            aparecerão alvos distratores, de cor vermelha, que são falsos <br> com o máximo de distratores sendo 10</h2>
    </button>
    <button class="acertou" onclick="acertou()">
        <div class="branca">
            <div class="vermeilha">
            </div>
        </div>
    </button>
    <script>
        let qtdistratores = 0

        function errou() {
            const distratores = document.querySelectorAll(".distrator")
            let pontuacao = document.getElementById("pts").innerText
            pontuacao = parseInt(pontuacao)
            const alvo = document.querySelector(".acertou")

            alert("Você errou, sua pontuação foi " + pontuacao)

            document.getElementById("pts").innerText = "0"
            alvo.style.left = 50 + "vw"
            alvo.style.top = 50 + "vh"

            distratores.forEach(d => {
                d.remove()
            })

            qtdistratores = 0
        }

        function acertou() {
            let pontuacao = document.getElementById("pts").innerText
            pontuacao = parseInt(pontuacao)

            pontuacao += 10

            document.getElementById("pts").innerText = pontuacao

            const alvo = document.querySelector(".acertou")

            const x = Math.random() * (window.innerWidth - 100)
            const y = Math.random() * (window.innerHeight - 100)

            alvo.style.left = x + "px"
            alvo.style.top = y + "px"

            if (pontuacao % 200 === 0 && qtdistratores <= 10) {
                criarFalso()
                qtdistratores += 1
            }

            if (qtdistratores > 0) {
                const distratores = document.querySelectorAll(".distrator")

                distratores.forEach(d => {
                    const x = Math.random() * (window.innerWidth - 50)
                    const y = Math.random() * (window.innerHeight - 50)

                    d.style.left = x + "px"
                    d.style.top = y + "px"
                })
            }
        }

        function criarFalso() {
            const distrator = document.createElement("div")
            const tela = document.getElementById("errou")
            distrator.classList.add("distrator")

            const y = Math.random() * (window.innerHeight - 100)
            const x = Math.random() * (window.innerWidth - 100)

            distrator.style.top = y + "px"
            distrator.style.left = x + "px"

            tela.appendChild(distrator)
        }
    </script>
</body>

</html>
