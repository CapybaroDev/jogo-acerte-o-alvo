<!DOCTYPE html>
<html lang="PT-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acerta o alvo</title>
    <style>
        *{
            margin: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        h1{
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
        }

        button.errou{
            background-color: black;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
        }

        button.acertou{
            background-color: red;
            width: 50px;
            height: 50px;
            border-radius: 50px;
            position: absolute;
            top: 50vh;
            left: 50vw;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        div.branca{
            background-color: white;
            width: 30px;
            height: 30px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        div.vermeilha{
            background-color: red;
            width: 10px;
            height: 10px;
            border-radius: 10px;
        }

        button{
            border: none;
        }

    </style>
</head>
<body>
    <h1>pontuação: <strong id="pts">0</strong></h1>
    <button class="errou" onclick="errou()">
        <h2 style="margin-top: 30vh; color: gray; ">Regras: clique no alvo e marque pontos</h2>
    </button>
    <button class="acertou" onclick="acertou()">
        <div class="branca">
            <div class="vermeilha">
            </div>
        </div>
    </button>
    <script>
        alert("Regras: clique no alvo e marque pontos ;)")
        function errou(){
            let pontuacao = document.getElementById("pts").innerText
            pontuacao = parseInt(pontuacao)
            if (pontuacao == 0){
                console.log("nada acontece")
                const alvo = document.querySelector(".acertou")
                const x = Math.random() * (window.innerWidth - 100)
                const y = Math.random() * (window.innerHeight - 100)

                alvo.style.left = x + "px"
                alvo.style.top = y + "px"
            }
            else if (pontuacao > 0){
                pontuacao -= 10
                document.getElementById("pts").innerText = pontuacao
                const alvo = document.querySelector(".acertou")
                const x = Math.floor(Math.random() * (window.innerWidth - 50))
                const y = Math.floor(Math.random() * (window.innerHeight - 50))

                alvo.style.left = x + "px"
                alvo.style.top = y + "px"
            }
        }
        function acertou(){
            let pontuacao = document.getElementById("pts").innerText
            pontuacao = parseInt(pontuacao)

            pontuacao += 10

            document.getElementById("pts").innerText = pontuacao

            const alvo = document.querySelector(".acertou")

            const x = Math.random() * (window.innerWidth - 100)
            const y = Math.random() * (window.innerHeight - 100)

            alvo.style.left = x + "px"
            alvo.style.top = y + "px"
        }
    </script>
</body>
</html>
